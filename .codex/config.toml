[mcp_servers.filesystem]
command = "npx"
args = [
  "-y",
  "@modelcontextprotocol/server-filesystem",
  "/home/reggie/vscode_folder/Enterprise-grade_RAG",
  "/home/reggie/vscode_folder/MCP",
]

[mcp_servers.git]
command = "docker"
args = [
  "run",
  "--rm",
  "-i",
  "--mount",
  "type=bind,src=/home/reggie/vscode_folder/Enterprise-grade_RAG,dst=/workspace/repo",
  "mcp/git",
  "-r",
  "/workspace/repo",
]

[mcp_servers.codegraph]
command = "node"
args = [
  "/home/reggie/vscode_folder/MCP/mcp-server-codegraph/dist/index.js",
  "/home/reggie/vscode_folder/Enterprise-grade_RAG",
]
cwd = "/home/reggie/vscode_folder/MCP/mcp-server-codegraph"
startup_timeout_sec = 60

[mcp_servers."mcp-streamable-http"]
command = "/home/reggie/vscode_folder/Enterprise-grade_RAG/.codex/bin/run-streamable-http-mcp.sh"
startup_timeout_sec = 30

[mcp_servers."next-ai-draw-io"]
command = "/home/reggie/vscode_folder/Enterprise-grade_RAG/.codex/bin/run-next-ai-drawio-mcp.sh"
startup_timeout_sec = 60

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"

[mcp_servers.qdrant]
command = "/home/reggie/vscode_folder/Enterprise-grade_RAG/.codex/bin/run-qdrant-mcp.sh"
startup_timeout_sec = 60

[mcp_servers."chrome-devtools"]
command = "node"
args = [
  "/home/reggie/vscode_folder/MCP/chrome-devtools-mcp/build/src/index.js",
  "--headless",
  "--isolated",
]
cwd = "/home/reggie/vscode_folder/MCP/chrome-devtools-mcp"
startup_timeout_sec = 60
