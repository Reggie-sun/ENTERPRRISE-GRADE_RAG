# Retrieval Evaluation Samples
#
# `status: verified` means the query + expected_doc_ids were checked against the
# current indexed corpus and live `/api/v1/retrieval/search` outputs.
# `source: synthetic` still means the query is curated rather than copied from
# production query logs.
#
# Seed-set limitation:
# - This first verified set intentionally excludes cross-dept supplemental cases.
# - Current evaluator logs in as a single `sys_admin` user, so it cannot verify
#   department-scoped auth / supplemental behavior yet.

samples:
  # exact / code-like
  - id: exact-001
    query: "700000 面板急停报警 现场先查什么"
    query_type: exact
    expected_granularity: fine
    expected_doc_ids: ["doc_20260321070337_445684f4"]
    expected_chunk_type: clause
    expected_terms: ["700000", "面板急停报警", "现场先查什么"]
    supplemental_expected: false
    requester_department_id: "dept_after_sales"
    status: verified
    source: synthetic
    note: "已按当前索引验证：123.txt 中 700000 面板急停报警条目"

