# Retrieval Evaluation Samples
#
# `status: verified` means the query + expected_doc_ids were checked against the
# current indexed corpus and live `/api/v1/retrieval/search` outputs.
# `source: synthetic` still means the query is curated rather than copied from
# production query logs.
#
# Seed-set limitation:
# - The original 19 verified samples intentionally excluded cross-dept supplemental cases.
# - Current evaluator logs in as a single `sys_admin` user, so it cannot verify
#   department-scoped auth / supplemental behavior yet.
#
# Cross-dept supplemental samples (cross-001 through cross-012):
# - These samples have `supplemental_expected: true` to represent scenarios where
#   the answer requires documents from a department other than the requester's.
# - query → expected_doc_ids mapping is verified against the live index.
# - `requester_department_id` is a LABEL only — NOT real auth simulation.
# - Status is `verified` for index hit, but auth behavior remains PROVISIONAL
#   until real department-scoped retrieval is enforced.
# - See individual sample `note` fields for evidence boundaries.

