<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="45" fill="#b6462f"/>
  <!-- 文档图标 -->
  <rect x="30" y="25" width="40" height="50" rx="4" fill="white" opacity="0.9"/>
  <!-- 文档线条 -->
  <line x1="38" y1="38" x2="62" y2="38" stroke="#b6462f" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="48" x2="62" y2="48" stroke="#b6462f" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="58" x2="54" y2="58" stroke="#b6462f" stroke-width="3" stroke-linecap="round"/>
  <!-- 放大镜 -->
  <circle cx="68" cy="68" r="12" fill="none" stroke="white" stroke-width="3"/>
  <line x1="76" y1="76" x2="84" y2="84" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>