services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: enterprise-rag-api
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant
    container_name: enterprise-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./storage/qdrant:/qdrant/storage
