services:
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: enterprise-rag-worker
    command: celery -A backend.app.worker.celery_app:celery_app worker --loglevel=info -Q ingest
    env_file:
      - .env
    environment:
      RAG_QDRANT_URL: http://qdrant:6333
      RAG_CELERY_BROKER_URL: redis://redis:6379/0
      RAG_CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./:/app
    depends_on:
      - qdrant
      - redis

  qdrant:
    image: qdrant/qdrant
    container_name: enterprise-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./storage/qdrant:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: enterprise-rag-redis
    ports:
      - "6379:6379"
